<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDC - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1>RDC</h1>
                <p class="login-subtitle">Research & Development Center</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                </div>
                <div id="loginError" class="login-error hidden"></div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
            <p class="login-hint">Demo accounts: admin / admin123  •  user1 / password1</p>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Login page specific script
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');

            if (!username || !password) {
                errorEl.textContent = 'Please enter both username and password.';
                errorEl.classList.remove('hidden');
                return;
            }

            const result = login(username, password);
            if (result.success) {
                errorEl.classList.add('hidden');
                window.location.href = 'index.html';
            } else {
                errorEl.textContent = result.message || 'Invalid username or password.';
                errorEl.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
